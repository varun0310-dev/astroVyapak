<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 120" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe17d" />
      <stop offset="50%" stop-color="#fdc533" />
      <stop offset="100%" stop-color="#d49a17" />
    </linearGradient>
    
    <!-- Navy Gradient -->
    <linearGradient id="navy-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#143154" />
      <stop offset="100%" stop-color="#0B2038" />
    </linearGradient>
    
    <!-- Gold Glow -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Logo Icon (X: 10 to 110, Y: 10 to 110) -->
  <g transform="translate(10, 10)">
    <!-- Sacred Geometry Backdrop (Intersecting Circles / Seed of Life style) -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(11, 32, 56, 0.08)" stroke-width="1" />
    <circle cx="50" cy="50" r="30" fill="none" stroke="url(#gold-gradient)" stroke-width="0.5" stroke-dasharray="2, 1" opacity="0.6" />
    
    <!-- Intersecting circles forming a mandalic aura -->
    <circle cx="50" cy="35" r="15" fill="none" stroke="rgba(253, 197, 51, 0.3)" stroke-width="0.75" />
    <circle cx="50" cy="65" r="15" fill="none" stroke="rgba(253, 197, 51, 0.3)" stroke-width="0.75" />
    <circle cx="35" cy="50" r="15" fill="none" stroke="rgba(253, 197, 51, 0.3)" stroke-width="0.75" />
    <circle cx="65" cy="50" r="15" fill="none" stroke="rgba(253, 197, 51, 0.3)" stroke-width="0.75" />

    <!-- Stylized Lotus Flower Petals -->
    <!-- Center Leaf (Navy with Gold Spine) -->
    <path d="M50,32 C55,45 55,62 50,68 C45,62 45,45 50,32 Z" fill="url(#navy-gradient)" />
    <path d="M50,32 C51,45 51,62 50,68" stroke="url(#gold-gradient)" stroke-width="1" fill="none" />
    
    <!-- Left Inner Petal (Gold) -->
    <path d="M50,42 C38,48 38,62 50,68 C42,62 42,52 50,42 Z" fill="url(#gold-gradient)" />
    
    <!-- Right Inner Petal (Gold) -->
    <path d="M50,42 C62,48 62,62 50,68 C58,62 58,52 50,42 Z" fill="url(#gold-gradient)" />

    <!-- Left Outer Petal (Navy) -->
    <path d="M50,50 C26,53 32,68 50,68 C34,68 34,58 50,50 Z" fill="url(#navy-gradient)" opacity="0.9" />

    <!-- Right Outer Petal (Navy) -->
    <path d="M50,50 C74,53 68,68 50,68 C66,68 66,58 50,50 Z" fill="url(#navy-gradient)" opacity="0.9" />
    
    <!-- Lotus Base / Pool of Wisdom -->
    <path d="M30,68 C40,75 60,75 70,68 C62,71 38,71 30,68 Z" fill="url(#gold-gradient)" />
    <path d="M36,73 C42,78 58,78 64,73" stroke="url(#gold-gradient)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.8" />

    <!-- Divine Star of Guidance rising from Lotus -->
    <g transform="translate(50, 24)" fill="url(#gold-gradient)" filter="url(#gold-glow)">
      <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" />
      <circle cx="0" cy="0" r="1.2" fill="#fff" />
    </g>

    <!-- Starry dots around Lotus aura -->
    <circle cx="28" cy="40" r="1" fill="url(#gold-gradient)" />
    <circle cx="72" cy="40" r="1" fill="url(#gold-gradient)" />
    <circle cx="22" cy="55" r="0.8" fill="url(#gold-gradient)" />
    <circle cx="78" cy="55" r="0.8" fill="url(#gold-gradient)" />
  </g>

  <!-- Typography Group (X: 130 onwards, Y: 10 to 110) -->
  <g transform="translate(130, 0)">
    <!-- Brand Title -->
    <text x="0" y="66" font-family="'Outfit', sans-serif" font-size="44" font-weight="800" fill="#0B2038" letter-spacing="-0.5">
      Astro<tspan fill="url(#gold-gradient)" font-weight="600">Vyapak</tspan>
    </text>
    
    <!-- Divider Line -->
    <line x1="0" y1="80" x2="390" y2="80" stroke="url(#gold-gradient)" stroke-width="2" stroke-linecap="round" />
    <circle cx="390" cy="80" r="3" fill="#0B2038" />

    <!-- Subtitle / Tagline -->
    <text x="0" y="100" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" fill="#4a5d73" letter-spacing="3.0" text-transform="uppercase">
      Your Guide to Cosmic Wisdom &amp; Harmony
    </text>
  </g>
</svg>
