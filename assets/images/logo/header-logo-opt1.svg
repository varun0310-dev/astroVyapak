<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 120" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient for a premium metallic look -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe17d" />
      <stop offset="50%" stop-color="#fdc533" />
      <stop offset="100%" stop-color="#d49a17" />
    </linearGradient>
    
    <!-- Navy Gradient -->
    <linearGradient id="navy-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#143154" />
      <stop offset="100%" stop-color="#0B2038" />
    </linearGradient>
    
    <!-- Shadow Effect -->
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Group containing Logo Icon (X: 10 to 110, Y: 10 to 110) -->
  <g transform="translate(10, 10)">
    <!-- Outer Zodiac Circle -->
    <circle cx="50" cy="50" r="46" fill="none" stroke="url(#gold-gradient)" stroke-width="1.5" />
    
    <!-- Inner Zodiac Circle -->
    <circle cx="50" cy="50" r="41" fill="none" stroke="url(#gold-gradient)" stroke-width="0.75" stroke-dasharray="2, 2" />
    
    <!-- Core Cosmos Circle -->
    <circle cx="50" cy="50" r="35" fill="url(#navy-gradient)" filter="url(#subtle-shadow)" />

    <!-- Zodiac Division Rays (12 lines for 12 signs) -->
    <g stroke="rgba(253, 197, 51, 0.2)" stroke-width="0.5">
      <line x1="50" y1="9" x2="50" y2="91" />
      <line x1="9" y1="50" x2="91" y2="50" />
      <line x1="20.5" y1="20.5" x2="79.5" y2="79.5" />
      <line x1="20.5" y1="79.5" x2="79.5" y2="20.5" />
      <!-- Extra divisions -->
      <line x1="32.5" y1="13.5" x2="67.5" y2="86.5" />
      <line x1="13.5" y1="32.5" x2="86.5" y2="67.5" />
      <line x1="13.5" y1="67.5" x2="86.5" y2="32.5" />
      <line x1="32.5" y1="86.5" x2="67.5" y2="13.5" />
    </g>

    <!-- Outer Stars (Sparkles) -->
    <g fill="url(#gold-gradient)">
      <polygon points="50,4 51.5,8 55,8 52,10 53,13.5 50,11.5 47,13.5 48,10 45,8 48.5,8" transform="scale(0.4) translate(75, 10)" />
      <polygon points="50,4 51.5,8 55,8 52,10 53,13.5 50,11.5 47,13.5 48,10 45,8 48.5,8" transform="scale(0.4) translate(10, 80)" />
      <polygon points="50,4 51.5,8 55,8 52,10 53,13.5 50,11.5 47,13.5 48,10 45,8 48.5,8" transform="scale(0.4) translate(195, 120)" />
    </g>

    <!-- Glowing Cosmic Sun Rays -->
    <g fill="url(#gold-gradient)">
      <!-- 8 main rays -->
      <path d="M50,22 L52.5,33 L47.5,33 Z" />
      <path d="M50,78 L52.5,67 L47.5,67 Z" />
      <path d="M22,50 L33,52.5 L33,47.5 Z" />
      <path d="M78,50 L67,52.5 L67,47.5 Z" />
      <path d="M30.2,30.2 L40.5,35.5 L35.5,40.5 Z" />
      <path d="M69.8,69.8 L59.5,64.5 L64.5,59.5 Z" />
      <path d="M30.2,69.8 L40.5,64.5 L35.5,59.5 Z" />
      <path d="M69.8,30.2 L59.5,35.5 L64.5,40.5 Z" />
    </g>

    <!-- Radiant Central Sun & Crescent Moon Harmony -->
    <circle cx="50" cy="50" r="13" fill="url(#gold-gradient)" />
    
    <!-- Crescent Moon overlay that creates the yin-yang cosmic style -->
    <path d="M52,37 A13,13 0 0,0 38,53 A12.5,12.5 0 0,1 52,37" fill="#0B2038" opacity="0.85" />
    
    <!-- Tiny Stars in moon body -->
    <circle cx="43" cy="46" r="0.8" fill="url(#gold-gradient)" />
    <circle cx="46" cy="53" r="0.6" fill="url(#gold-gradient)" />
  </g>

  <!-- Typography Group (X: 130 onwards, Y: 10 to 110) -->
  <g transform="translate(130, 0)">
    <!-- Brand Title -->
    <text x="0" y="66" font-family="'Outfit', sans-serif" font-size="44" font-weight="800" fill="#0B2038" letter-spacing="-0.5">
      Astro<tspan fill="url(#gold-gradient)" font-weight="600">Vyapak</tspan>
    </text>
    
    <!-- Divider Line -->
    <line x1="0" y1="80" x2="390" y2="80" stroke="url(#gold-gradient)" stroke-width="2" stroke-linecap="round" />
    <circle cx="390" cy="80" r="3" fill="#0B2038" />

    <!-- Subtitle / Tagline -->
    <text x="0" y="100" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" fill="#4a5d73" letter-spacing="3.2" text-transform="uppercase">
      Kundli · Numerology · Astro Consultant
    </text>
  </g>
</svg>
